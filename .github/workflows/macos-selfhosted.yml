name: macOS (self-hosted)

# Runs the full fledge `ci` lane on a self-hosted macOS runner that already has the
# Android SDK, the Android Studio JBR, and fledge installed. Triggered manually or on
# pushes to main so it never blocks PRs when the runner is offline.
#
# Register the runner once with:  ./scripts/setup-macos-runner.sh
# (see that script for the token step), then start it with `./run.sh` in the runner dir.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "**/*.gradle"
      - "**/*.gradle.kts"
      - "gradle/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "fledge.toml"
      - ".github/workflows/macos-selfhosted.yml"

concurrency:
  group: macos-selfhosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Point Gradle at the local Android SDK
        run: echo "sdk.dir=$HOME/Library/Android/sdk" > local.properties

      - name: Run fledge CI lane (build + tests + snapshots + spec check)
        run: fledge lanes run ci --non-interactive

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload Paparazzi diffs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: paparazzi-failures
          path: app/build/paparazzi/failures/**
          if-no-files-found: ignore
