name: CI

# Builds the debug APK on every push / PR to main and uploads it as an artifact.
#
# This is a PRIVATE repo, so build/test run on our self-hosted macOS runners
# (corvid-mac-*), which already have the Android SDK, the Android Studio JBR, and
# fledge installed. Governance validation is handled by the required `trust` workflow.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "**/*.gradle"
      - "**/*.gradle.kts"
      - "gradle/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "fledge.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "**/*.gradle"
      - "**/*.gradle.kts"
      - "gradle/**"
      - "gradle.properties"
      - "settings.gradle.kts"
      - "fledge.toml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure fledge is available
        run: command -v fledge || { echo "::error::fledge missing on $(hostname)"; exit 1; }

      - name: Point Gradle at the local Android SDK
        run: echo "sdk.dir=$HOME/Library/Android/sdk" > local.properties

      - name: Assemble debug APK
        run: fledge run build

      - name: Upload debug APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
