name: "Deploy site (GitHub Pages)"

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node 24 for JS actions (silences the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # atlas reads git history for activity

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build site
        run: cd site && bun install --frozen-lockfile && bun run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Render the spec-coverage badge + SVG cards from the atlas into the built
      # site, so they ship to Pages alongside it (served at
      # corvidlabs.github.io/compose-playground/badges/). Cached by the pinned v1
      # commit so the step is a fast no-op on a cache hit.
      - name: Resolve pinned atlas commit (cache key)
        id: atlasref
        run: echo "sha=$(git ls-remote https://github.com/CorvidLabs/fledge-plugin-atlas v1 | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache the fledge-atlas CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/fledge-atlas
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: fledge-atlas-${{ runner.os }}-${{ steps.atlasref.outputs.sha }}

      - name: Render atlas coverage badges
        uses: CorvidLabs/fledge-plugin-atlas@v1
        with:
          path: .
          output-dir: site/dist/badges
          components: "coverage langmix treemap sunburst"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site/dist"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
